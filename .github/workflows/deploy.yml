name: Deploy Mixa Backend

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Pull image terbaru
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Pindah ke direktori project di server
            cd /home/syamban/mixa_trading
            
            # Unduh docker-compose.yml terbaru langsung dari GitHub (tanpa perlu Git)
            wget -qO docker-compose.yml https://raw.githubusercontent.com/syamban14/mixa-backend/master/docker-compose.yml
            
            # Nyalakan dan perbarui semua container (termasuk mixa-db/Postgres)
            docker-compose up -d --force-recreate
            
            # Beri waktu 5 detik agar backend siap, lalu jalankan skrip migrasi database SaaS
            sleep 5
            docker exec mixa-backend python migrate_saas.py
            
            # Hapus image lama
            docker image prune -f
